<!DOCTYPE html>
<html>
<head>
  <title>Mencore Anonymous</title>
  <style>
    body {
      background: linear-gradient(to right, skyblue, white, gold);
      font-family: Arial;
      text-align: center;
      padding: 50px;
    }

    h1 {
      color: #333;
    }

    textarea {
      width: 80%;
      height: 100px;
      padding: 10px;
      border-radius: 10px;
      border: none;
    }

    button {
      padding: 10px 20px;
      background: gold;
      border: none;
      border-radius: 10px;
      margin-top: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>Welcome to Mencore</h1>
<p>Powered by MENMEX</p>

<textarea id="message" placeholder="Send anonymous message..."></textarea><br>

<button onclick="sendMessage()">Send</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyByqrWIVXVe4JnW0h1l_UzJzJQYlDXUU4I",
  authDomain: "mencore.firebaseapp.com",
  projectId: "mencore",
  storageBucket: "mencore.firebasestorage.app",
  messagingSenderId: "223090622351",
  appId: "1:223090622351:web:7ca7a578599344c265d5fa"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// USER ID FROM LINK
const params = new URLSearchParams(window.location.search);
const userId = params.get("id") || "menmex";

window.sendMessage = async function () {
  const message = document.getElementById("message").value;

  if (!message) {
    alert("Write something!");
    return;
  }

  try {
    await addDoc(collection(db, "messages", userId, "inbox"), {
      message: message,
      time: new Date()
    });

    alert("Message sent ✅");
    document.getElementById("message").value = "";

  } catch (error) {
    alert("Error: " + error.message);
    console.log(error);
  }
};
</script>

</body>
</html>
