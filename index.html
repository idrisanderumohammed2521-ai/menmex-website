<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mencore Anonymous</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Welcome to Mencore</h1>
    <p>Anonymous Messages — Powered by MENMEX</p>
</header>

<div class="card">
    <h2>Send Anonymous Message</h2>
    <textarea id="message" placeholder="Type your message..." rows="4"></textarea>
    <button onclick="sendMessage()">Send</button>
</div>

<div class="card">
    <h2>Messages</h2>
    <div id="messages"></div>
</div>

<script src="script.js"></script>

</body>
</html>
