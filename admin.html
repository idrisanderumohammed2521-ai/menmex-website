<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyByqrWIVXVe4JnW0h1l_UzJzJQYlDXUU4I",
  authDomain: "mencore.firebaseapp.com",
  projectId: "mencore",
  storageBucket: "mencore.firebasestorage.app",
  messagingSenderId: "223090622351",
  appId: "1:223090622351:web:7ca7a578599344c265d5fa"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 ENTER YOUR USER ID HERE
const userId = "menmex";

async function loadMessages() {
  const querySnapshot = await getDocs(collection(db, "messages", userId, "inbox"));
  const container = document.getElementById("messages");

  querySnapshot.forEach((doc) => {
    const data = doc.data();

    container.innerHTML += `
      <div class="msg">
        <div class="name">${data.name}</div>
        <div>${data.message}</div>
      </div>
    `;
  });
}

loadMessages();
</script>
